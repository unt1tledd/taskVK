name: Java CI/CD with Tarantool Stress Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 20
        uses: actions/setup-java@v4
        with:
          java-version: '20'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build without tests
        run: mvn -B clean install -DskipTests

      - name: Run logic tests
        run: mvn -B test -Dtest=KVServerTest

      - name: Prepare Tarantool data dir
        run: |
          mkdir -p ./tarantool/data
          chmod -R 777 ./tarantool/data

      - name: Start infrastructure
        run: docker compose up -d --build

      - name: Show containers
        run: docker compose ps

      - name: Wait for Tarantool and gRPC
        run: |
          for i in {1..60}; do
            if nc -z 127.0.0.1 3301 && nc -z 127.0.0.1 9090; then
              echo "Tarantool and gRPC are ready"
              exit 0
            fi
            echo "Waiting for services..."
            docker compose ps
            sleep 2
          done

          echo "Services did not start in time"
          docker compose logs --tail=300
          exit 1

      - name: Run stress tests
        run: mvn -B test -Dtest=StressTest

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=300

      - name: Stop infrastructure
        if: always()
        run: docker compose down -v